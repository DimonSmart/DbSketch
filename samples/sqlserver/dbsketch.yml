provider: sqlserver
connectionString: ${DBSKETCH_SQLSERVER_CONNECTION}

defaults:
  output:
    format: raw
  diagram:
    renderer: dot
    direction: LR
    compact: true
    show:
      schemaName: true
      columnTypes: false
      nullability: false
      primaryKeys: true
      foreignKeys: true
      tableComments: false
      columnComments: false

comments:
  enabled: false

diagrams:
  - name: dbo
    title: Database schema
    include:
      tables:
        - "dbo.*"
    exclude:
      tables:
        - "dbo.__EFMigrationsHistory"
    output:
      path: samples/output/sqlserver-dbo.dot
