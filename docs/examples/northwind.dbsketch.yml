provider: postgres
connectionString: "${DBSKETCH_DOCS_CONNECTION}"

comments:
  enabled: true

defaults:
  diagram:
    direction: LR
    compact: true
    show:
      schemaName: true
      columnTypes: false
      nullability: false
      primaryKeys: true
      foreignKeys: true

diagrams:
  - name: northwind-compact-dot
    title: Northwind schema - compact
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name}"
      tableHeaderLayout: "{fullName}"
      show:
        primaryKeys: false
        foreignKeys: false
        foreignKeyLabels: false
    output:
      path: docs/examples/northwind.compact.dot
      format: raw

  - name: northwind-full-dot
    title: Northwind schema - full
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
        foreignKeyLabels: true
    output:
      path: docs/examples/northwind.full.dot
      format: raw

  - name: northwind-dot
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
    output:
      path: docs/examples/northwind.dot
      format: raw

  - name: northwind-readme-dot
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: readable
      columnLayout: "{name:bold} {type:color=#666666}\n{comment:color=#666666,fontSize=9} | {keys}"
      tableHeaderLayout: "{table:bold}\n{comment:color=#666666,fontSize=9}"
      show:
        schemaName: false
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
        tableComments: true
        columnComments: true
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.readme.dot
      format: raw

  - name: northwind-style-classic
    title: Northwind schema - classic
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: classic
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.style.classic.dot
      format: raw

  - name: northwind-style-readable
    title: Northwind schema - readable
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: readable
      columnLayout: "{name:bold} {type:color=#666666}\n{comment:color=#666666,fontSize=9} | {keys:color=#666666}"
      tableHeaderLayout: "{table:bold}\n{comment:color=#666666,fontSize=9}"
      show:
        schemaName: false
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
        tableComments: true
        columnComments: true
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.style.readable.dot
      format: raw

  - name: northwind-style-compact
    title: Northwind schema - compact
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: compact
      columnLayout: "{name:bold} {type:color=#666666} | {comment:color=#666666,fontSize=9} | {keys:color=#666666}"
      tableHeaderLayout: "{table:bold}\n{comment:color=#666666,fontSize=9}"
      show:
        schemaName: false
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
        tableComments: true
        columnComments: true
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.style.compact.dot
      format: raw

  - name: northwind-style-soft
    title: Northwind schema - soft
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: soft
      columnLayout: "{name:bold} {type:color=#5E7568}\n{comment:color=#5E7568,fontSize=9} | {keys:color=#5E7568}"
      tableHeaderLayout: "{table:bold}\n{comment:color=#5E7568,fontSize=9}"
      show:
        schemaName: false
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
        tableComments: true
        columnComments: true
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.style.soft.dot
      format: raw

  - name: northwind-style-blueprint
    title: Northwind schema - blueprint
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: blueprint
      columnLayout: "{name:bold} {type:color=#2B6CB0} | {comment:color=#2B6CB0,fontSize=9} | {keys:color=#2B6CB0}"
      tableHeaderLayout: "{table:bold}\n{comment:color=#2B6CB0,fontSize=9}"
      show:
        schemaName: false
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
        tableComments: true
        columnComments: true
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.style.blueprint.dot
      format: raw

  - name: northwind-style-contrast
    title: Northwind schema - contrast
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      style: contrast
      columnLayout: "{name:bold} {type:color=#222222} | {comment:color=#222222,fontSize=9} | {keys:color=#222222}"
      tableHeaderLayout: "{table:bold}\n{comment:color=#222222,fontSize=9}"
      show:
        schemaName: false
        foreignKeyLabels: false
        selfReferencingForeignKeys: false
        tableComments: true
        columnComments: true
      comments:
        maxLength: 60
    output:
      path: docs/examples/northwind.style.contrast.dot
      format: raw

  - name: northwind-mermaid
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: mermaid
      show:
        tableComments: false
      mermaid:
        emitDirection: false
    output:
      path: docs/examples/northwind.mmd
      format: raw

  - name: northwind-markdown
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
    output:
      path: docs/examples/northwind.generated.md
      format: markdown
      markdown:
        fenceLanguage: dot
        header: |
          # Northwind DbSketch generated output

          This file is generated from the Northwind PostgreSQL test fixture.
