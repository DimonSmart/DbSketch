provider: postgres
connectionString: "${DBSKETCH_DOCS_CONNECTION}"

comments:
  enabled: true

defaults:
  diagram:
    direction: LR
    compact: true
    show:
      schemaName: true
      columnTypes: false
      nullability: false
      primaryKeys: true
      foreignKeys: true

diagrams:
  - name: northwind-compact-dot
    title: Northwind schema - compact
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name}"
      tableHeaderLayout: "{fullName}"
      show:
        primaryKeys: false
        foreignKeys: false
        foreignKeyLabels: false
    output:
      path: docs/examples/northwind.compact.dot
      format: raw

  - name: northwind-full-dot
    title: Northwind schema - full
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
        foreignKeyLabels: true
    output:
      path: docs/examples/northwind.full.dot
      format: raw

  - name: northwind-dot
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
    output:
      path: docs/examples/northwind.dot
      format: raw

  - name: northwind-readme-dot
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name}"
      tableHeaderLayout: "{fullName}"
      show:
        primaryKeys: false
        foreignKeys: false
        foreignKeyLabels: false
    output:
      path: docs/examples/northwind.readme.dot
      format: raw

  - name: northwind-mermaid
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: mermaid
      show:
        tableComments: false
      mermaid:
        emitDirection: false
    output:
      path: docs/examples/northwind.mmd
      format: raw

  - name: northwind-markdown
    title: Northwind schema
    include:
      tables:
        - "northwind.*"
    diagram:
      renderer: dot
      columnLayout: "{name} | {type} | {comment} | {keys}"
      tableHeaderLayout: "{fullName} | {comment}"
      show:
        columnTypes: true
        tableComments: true
        columnComments: true
    output:
      path: docs/examples/northwind.generated.md
      format: markdown
      markdown:
        fenceLanguage: dot
        header: |
          # Northwind DbSketch generated output

          This file is generated from the Northwind PostgreSQL test fixture.
