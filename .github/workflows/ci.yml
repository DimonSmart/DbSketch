name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  HUSKY: 0

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DbSketch.sln

      - name: Check formatting
        run: dotnet format DbSketch.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build DbSketch.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DbSketch.sln --configuration Release --no-build --verbosity normal
